# config.toml — single source of truth for watchlist, sectors, sources, send times.
#
# This file is plain data, read by the code (Python 3.11+ `tomllib`). Edit it to
# change behavior; no code changes required. Adding a ticker is a one-line edit
# to `watchlist.tickers` below.

[schedule]
# All times are Eastern. Schedule against the IANA zone (NOT a fixed UTC offset)
# so the AM/PM slots stay correct across the EDT/EST switch. Trading days only.
timezone = "America/New_York"
am_briefing = "07:45"   # AM Briefing — before market open
pm_debrief  = "17:00"   # PM Debrief — evening recap

[watchlist]
# One-line edit to add/remove a stock or ETF. Kept minimal on purpose.
tickers = ["META", "GOOGL"]

[sectors]
# Prioritization signal, not a hard filter. Order does not imply weight.
focus = [
  "technology",
  "healthcare",
  "consumer_discretionary",
  "energy",
  "industrials",
  "utilities",
  "materials",
  "financials",
]

[predictions]
# Locked horizon ladder. The model picks the appropriate horizon(s) per item.
horizons = ["same-day", "1-week", "1-month", "1-quarter", "6-months", "1-year"]

# ── Sources ──────────────────────────────────────────────────────────────────
# Native RSS where reliable. AP's native RSS is dead and Reuters' is unreliable,
# so both wires come through Google News RSS (free, no account, no expiry). The
# `site:` filter scopes each feed to one wire; `when:2d` keeps it recency-first
# (fetch.py also caps + drops stale items). Google News links are encoded
# redirects — extract.py resolves them to the real article URL for finalists.
# To widen/narrow a wire, edit the query string (e.g. add `politics` or change
# the `when:` window); to add a feed, append another URL to the list.

[sources.wires]
ap_news = ["https://news.google.com/rss/search?q=when:2d%20site:apnews.com&hl=en-US&gl=US&ceid=US:en"]
reuters = ["https://news.google.com/rss/search?q=when:2d%20site:reuters.com&hl=en-US&gl=US&ceid=US:en"]

[sources.tech]
# Real breakthroughs only — AI hype/product churn filtered at curation.
ars_technica  = "https://feeds.arstechnica.com/arstechnica/index"
ieee_spectrum = "https://spectrum.ieee.org/feeds/feed.rss"

[sources.learning]
# General-interest feeds for the PM "Something New" nightly learning piece —
# genuinely fascinating, NON-markets topics (science, history, engineering,
# psychology, geography, nature, space). One story is picked + distilled each
# night so the reader always learns something new. Recency is relaxed here
# (evergreen is fine), unlike the news wires. One-line edit to add/remove a feed.
atlas_obscura = "https://www.atlasobscura.com/feeds/latest"
aeon          = "https://aeon.co/feed.rss"
quanta        = "https://api.quantamagazine.org/feed/"
smithsonian   = "https://www.smithsonianmag.com/rss/latest_articles/"

[sources.economic]
# FRED series pulled via fredapi (key in .env). Release-calendar timing
# (Fed/BLS/Census) handled in fetch.py. Serious US metrics only.
fred_series = [
  "CPIAUCSL",  # CPI (inflation)
  "UNRATE",    # unemployment rate
  "GDPC1",     # real GDP
  "FEDFUNDS",  # fed funds rate
  "DGS10",     # 10-year Treasury yield
  "PCEPI",     # PCE price index
]

[market]
# Price lookups: yfinance primary, Finnhub fallback (key in .env).
primary_provider  = "yfinance"
fallback_provider = "finnhub"
# 10-year Treasury yield for the PM Market Summary comes from FRED (a clean rate
# read); shown as a level + daily change in basis points.
yield_series = "DGS10"

# Instruments shown in the PM Market Summary, in this order. Your watchlist
# tickers (see [watchlist] above) are added automatically under "Watchlist".
#   symbol = yfinance ticker · label = display name · group = section heading.
# One-line edit to add/remove a row (e.g. add silver as ["SI=F", "Silver"]).
[[market.summary]]
symbol = "^GSPC"
label  = "S&P 500"
group  = "Indices"
[[market.summary]]
symbol = "^IXIC"
label  = "Nasdaq"
group  = "Indices"
[[market.summary]]
symbol = "^DJI"
label  = "Dow"
group  = "Indices"
[[market.summary]]
symbol = "GC=F"
label  = "Gold"
group  = "Commodities"
[[market.summary]]
symbol = "CL=F"
label  = "Crude oil"
group  = "Commodities"
[[market.summary]]
symbol = "BTC-USD"
label  = "Bitcoin"
group  = "Crypto"
